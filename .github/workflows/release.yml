name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o proxy-panel ./cmd/server/
          tar -czf proxy-panel-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz proxy-panel
          sha256sum proxy-panel-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            > proxy-panel-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            proxy-panel-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            proxy-panel-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
